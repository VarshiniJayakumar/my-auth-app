<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth API - MVC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #1a73e8; }
        p { color: #5f6368; line-height: 1.6; }
        .badge { background: #e8f0fe; color: #1a73e8; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Auth API</h1>
        <p>Welcome to the User Authentication & Authorization API. This application follows the MVC pattern.</p>
        <div class="badge">API is Running</div>
        <p><small>Use Postman to interact with the endpoints.</small></p>
    </div>
</body>
</html>
