services:
  - type: web
    name: my-auth-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # You will need to paste your MongoDB Atlas URI in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: "production"
